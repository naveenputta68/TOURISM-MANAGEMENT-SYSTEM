<!DOCTYPE html>
<html>
<head>
    <title>Available Tours</title>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Available Tours</h1>
        <table>
            <tr>
                <th>Tour Name</th>
                <th>Location</th>
                <th>Price</th>
            </tr>
            {% for tour in tours %}
            <tr>
                <td>{{ tour[1] }}</td>
                <td>{{ tour[2] }}</td>
                <td>${{ tour[3] }}</td>
            </tr>
            {% endfor %}
        </table>
    </div>
</body>
</html>
