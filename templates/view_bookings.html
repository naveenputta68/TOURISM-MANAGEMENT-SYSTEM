<!DOCTYPE html>
<html>
<head>
    <title>Tour Bookings</title>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Tour Bookings</h1>
        <table>
            <tr>
                <th>ID</th>
                <th>Customer Name</th>
                <th>Email</th>
                <th>Tour Name</th>
                <th>Location</th>
                <th>Price</th>
            </tr>
            {% for booking in bookings %}
            <tr>
                <td>{{ booking[0] }}</td>
                <td>{{ booking[1] }}</td>
                <td>{{ booking[2] }}</td>
                <td>{{ booking[3] }}</td>
                <td>{{ booking[4] }}</td>
                <td>${{ booking[5] }}</td>
            </tr>
            {% endfor %}
        </table>
    </div>
</body>
</html>
